<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Partilha Sagrada — divisão dos materiais do Terreiro Pilão de Ouro" />
  <title>Partilha Sagrada — Pilão de Ouro</title>

  <!-- Google Fonts: Crimson Pro (elegant serif for the mystical theme) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

  <!-- ── Canvas layers (behind all content) ─────────────────────────────── -->
  <canvas id="canvas-bg" class="canvas-layer" aria-hidden="true"></canvas>

  <!-- ── Header ─────────────────────────────────────────────────────────── -->
  <header class="site-header">
    <span class="header-symbol" aria-hidden="true">✦</span>
    <h1 class="site-title">Partilha Sagrada</h1>
    <p class="site-subtitle">Pilão de Ouro &middot; Axé compartilhado</p>
    <div class="header-divider" aria-hidden="true"></div>
  </header>

  <!-- ── Cards grid ─────────────────────────────────────────────────────── -->
  <main>
    <div
      id="cards-grid"
      class="cards-grid"
      role="list"
      aria-label="Lista de partilha por pessoa"
    ></div>
  </main>

  <!-- ── Scripts  (load order follows dependency graph) ────────────────── -->
  <script src="js/data/store.js"></script>
  <script src="js/utils/formatter.js"></script>
  <script src="js/utils/paidStore.js"></script>
  <script src="js/components/ItemList.js"></script>
  <script src="js/components/PersonCard.js"></script>
  <script src="js/components/PixModal.js"></script>
  <script src="js/effects/ParticleSystem.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
